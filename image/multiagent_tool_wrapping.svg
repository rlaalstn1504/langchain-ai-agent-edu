<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Multi-agent tool wrapping flow</title>
  <desc id="desc">Supervisor agent calls wrapper tools. Each wrapper tool invokes a specialist agent, and each specialist agent uses its own internal tool.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="960" height="520" rx="20" fill="#f8fafc"/>

  <text x="480" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#0f172a">
    에이전트를 Tool처럼 감싸는 멀티에이전트 구조
  </text>

  <rect x="38" y="214" width="150" height="86" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>
  <text x="113" y="247" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">사용자 질문</text>
  <text x="113" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">주말 배송 일정?</text>

  <rect x="270" y="184" width="190" height="146" rx="16" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="365" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#075985">Supervisor</text>
  <text x="365" y="253" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">어떤 전문 에이전트를</text>
  <text x="365" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">호출할지 선택</text>
  <text x="365" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0369a1">tools=[ask_policy_agent,</text>
  <text x="365" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0369a1">ask_schedule_agent]</text>

  <rect x="548" y="98" width="196" height="96" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadow)"/>
  <text x="646" y="131" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#9a3412">ask_policy_agent</text>
  <text x="646" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0f172a">@tool wrapper</text>
  <text x="646" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#9a3412">정책 에이전트 호출</text>

  <rect x="548" y="320" width="196" height="96" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadow)"/>
  <text x="646" y="353" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#9a3412">ask_schedule_agent</text>
  <text x="646" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0f172a">@tool wrapper</text>
  <text x="646" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#9a3412">일정 에이전트 호출</text>

  <rect x="805" y="82" width="120" height="78" rx="12" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="865" y="113" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#065f46">policy_agent</text>
  <text x="865" y="137" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0f172a">전문 에이전트</text>

  <rect x="805" y="174" width="120" height="58" rx="12" fill="#ffffff" stroke="#86efac" stroke-width="2"/>
  <text x="865" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#166534">search_policy</text>

  <rect x="805" y="304" width="120" height="78" rx="12" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="865" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#065f46">schedule_agent</text>
  <text x="865" y="359" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0f172a">전문 에이전트</text>

  <rect x="805" y="396" width="120" height="58" rx="12" fill="#ffffff" stroke="#86efac" stroke-width="2"/>
  <text x="865" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#166534">lookup_schedule</text>

  <path d="M188 257 H260" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M460 220 C498 185 510 151 538 146" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M460 294 C498 329 510 363 538 368" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M744 146 H793" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M744 368 H793" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M865 160 V168" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <path d="M865 382 V390" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>

  <text x="504" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#475569">supervisor가 보는 Tool</text>
  <text x="503" y="440" font-family="Arial, sans-serif" font-size="13" fill="#475569">supervisor가 보는 Tool</text>
  <text x="805" y="261" font-family="Arial, sans-serif" font-size="13" fill="#475569">하위 에이전트 내부 Tool</text>
  <text x="42" y="478" font-family="Arial, sans-serif" font-size="15" fill="#334155">
    핵심: 하위 에이전트의 내부 Tool을 감싸는 것이 아니라, 하위 에이전트를 호출하는 함수를 @tool로 노출한다.
  </text>
</svg>
