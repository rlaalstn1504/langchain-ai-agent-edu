<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Agent API and Graph API comparison</title>
  <desc id="desc">Agent API is useful for quick action selection, while Graph API is useful for explicit state and flow control.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-10%" y="-12%" width="120%" height="135%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 26px; font-weight: 700; fill: #0f172a; text-anchor: middle; }
      .laneTitle { font-family: Arial, sans-serif; font-size: 21px; font-weight: 700; fill: #0f172a; text-anchor: middle; }
      .label { font-family: Arial, sans-serif; font-size: 16px; font-weight: 700; fill: #0f172a; text-anchor: middle; }
      .small { font-family: Arial, sans-serif; font-size: 13px; fill: #475569; text-anchor: middle; }
      .branchLabel { font-family: Arial, sans-serif; font-size: 14px; font-weight: 700; fill: #0f172a; text-anchor: middle; }
      .branchSmall { font-family: Arial, sans-serif; font-size: 12px; fill: #475569; text-anchor: middle; }
      .note { font-family: Arial, sans-serif; font-size: 14px; fill: #334155; text-anchor: middle; }
      .line { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .loop { stroke: #7c3aed; stroke-width: 2.1; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="960" height="520" rx="20" fill="#f8fafc"/>
  <text class="title" x="480" y="44">Agent API와 Graph API는 제어 수준이 다르다</text>

  <rect x="42" y="78" width="410" height="350" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.8"/>
  <text class="laneTitle" x="247" y="115">Agent API: 빠른 에이전트 구성</text>
  <text class="small" x="247" y="140">모델이 바로 답할지, Tool을 쓸지 선택</text>

  <rect x="80" y="190" width="112" height="62" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.8" filter="url(#shadow)"/>
  <text class="label" x="136" y="216">사용자 요청</text>
  <text class="small" x="136" y="237">질문 입력</text>

  <rect x="238" y="168" width="164" height="106" rx="14" fill="#e0f2fe" stroke="#0284c7" stroke-width="2" filter="url(#shadow)"/>
  <text class="label" x="320" y="199">create_agent</text>
  <text class="small" x="320" y="225">모델 + Tool +</text>
  <text class="small" x="320" y="245">system_prompt</text>

  <rect x="156" y="330" width="184" height="54" rx="12" fill="#f1f5f9" stroke="#64748b" stroke-width="1.7"/>
  <text class="label" x="248" y="352">적합한 경우</text>
  <text class="small" x="248" y="373">단순 Tool 선택, 빠른 실험</text>

  <path class="line" d="M192 221 H228"/>
  <path class="line" d="M320 274 V320"/>

  <rect x="508" y="78" width="410" height="350" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.8"/>
  <text class="laneTitle" x="713" y="115">Graph API: 명시적인 흐름 제어</text>
  <text class="small" x="713" y="140">상태, 분기, 재시도, 사람 검토를 단계로 표현</text>

  <rect x="544" y="184" width="94" height="58" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.8" filter="url(#shadow)"/>
  <text class="label" x="591" y="209">State</text>
  <text class="small" x="591" y="229">작업 상태</text>

  <rect x="680" y="166" width="112" height="58" rx="12" fill="#ecfdf5" stroke="#059669" stroke-width="1.8" filter="url(#shadow)"/>
  <text class="label" x="736" y="191">Node</text>
  <text class="small" x="736" y="211">한 단계 처리</text>

  <path d="M852 176 L902 214 L852 252 L802 214 Z" fill="#fff7ed" stroke="#ea580c" stroke-width="1.8" filter="url(#shadow)"/>
  <text class="branchLabel" x="852" y="210">분기</text>
  <text class="branchSmall" x="852" y="229">조건 판단</text>

  <rect x="604" y="302" width="116" height="58" rx="12" fill="#fdf2f8" stroke="#db2777" stroke-width="1.8" filter="url(#shadow)"/>
  <text class="label" x="662" y="327">재시도</text>
  <text class="small" x="662" y="347">상태 갱신</text>

  <rect x="776" y="302" width="116" height="58" rx="12" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.8" filter="url(#shadow)"/>
  <text class="label" x="834" y="327">사람 검토</text>
  <text class="small" x="834" y="347">승인/거절</text>

  <path class="line" d="M638 213 H670"/>
  <path class="line" d="M792 195 H806"/>
  <path class="loop" d="M836 250 C808 290 748 326 730 330"/>
  <path class="loop" d="M852 252 C856 276 850 288 838 302"/>

  <rect x="618" y="386" width="190" height="54" rx="12" fill="#f1f5f9" stroke="#64748b" stroke-width="1.7"/>
  <text class="label" x="713" y="408">적합한 경우</text>
  <text class="small" x="713" y="429">분기, 상태, 재시도, 승인</text>

  <rect x="100" y="462" width="760" height="34" rx="12" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.4"/>
  <text class="note" x="480" y="484">정리: Agent API는 행동 선택을 빠르게 만들고, Graph API는 실행 경로를 코드로 드러낸다.</text>
</svg>
